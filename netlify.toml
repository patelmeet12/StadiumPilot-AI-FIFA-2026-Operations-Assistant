[build]
  command = "git clone https://github.com/flutter/flutter.git -b stable --depth 1 ~/flutter && ~/flutter/bin/flutter config --enable-web && ~/flutter/bin/flutter pub get && ~/flutter/bin/flutter build web --release --base-href /"
  publish = "build/web"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
